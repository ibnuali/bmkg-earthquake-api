services:
  earthquake-api:
    build: .
    container_name: earthquake-api
    ports:
      - "8090:8085"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8085
      - SERVER_READ_TIMEOUT=10s
      - SERVER_WRITE_TIMEOUT=30s
      - SERVER_IDLE_TIMEOUT=60s
      - BMKG_BASE_URL=https://data.bmkg.go.id
      - BMKG_JSON_ENDPOINT=/DataMKG/TEWS
      - BMKG_SHAKEMAP_URL=https://static.bmkg.go.id
      - BMKG_HTTP_TIMEOUT=10s
      - BMKG_MAX_RETRIES=2
      - BMKG_RETRY_WAIT=500ms
      - CACHE_ENABLED=true
      - CACHE_TTL=30s
      - CACHE_CLEANUP_INTERVAL=60s
      - CORS_ALLOWED_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
